<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Styleguide - Techium</title>
</head>
<body>
    <main>
        <!--Previous sections like Paragraph, Lists, Horizontal rule, Blockquotes, Typography-->

        <!-- New line and comment for Table -->
        <br>
        <!--Table-->

        <section>
            <header>
                <h2>Table</h2>
            </header>

            <table border="1">
                <thead>
                    <tr>
                        <th scope="col">Title</th>
                        <th scope="col">Director</th>
                        <th scope="col">Release Date</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <th scope="row">Star Wars: A New Hope</th>
                        <td>George Lucas</td>
                        <td>1977</td>
                    </tr>
                    <tr>
                        <th scope="row">The Empire Strikes Back</th>
                        <td>Irvin Kershner</td>
                        <td>1980</td>
                    </tr>
                    <tr>
                        <th scope="row">Return of the Jedi</th>
                        <td>Richard Marquand</td>
                        <td>1983</td>
                    </tr>
                </tbody>
            </table>

        </section>

    </main>

</html>
